openapi: 3.0.0
info:
  title: PDF report settings (обложка и сводная страница)
  version: 1.2.1
  description: |
    **Единственная OpenAPI-спека** для настроек PDF-отчёта агента: обложка, сводная страница, загрузки в R2, превью HTML.
    Настройки PDF-отчёта на **агента**: обложка (фон, плашка) и страница **«Сводная информация»** (лого, акцентный цвет).
    Дата на обложке при генерации PDF подставляется автоматически (см. `date_preview` в ответе только для превью в ЛК).
    Иллюстрации карточек целей по типу (`goal_card_assets`) — только read-only в `GET`/`PATCH` response, для превью макета в ЛК.

servers:
  - url: /api
    description: Относительно хоста бэкенда

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectKeyHeader:
      name: x-project-key
      in: header
      required: false
      schema:
        type: string

  schemas:
    GoalCardAssetItem:
      type: object
      description: Одна картинка карточки цели (имя файла = тип цели в API).
      readOnly: true
      required:
        - goal_type
        - filename
        - r2_object_key
        - repo_relative_path
      properties:
        goal_type:
          type: string
          description: Совпадает с `goal_type` в отчёте (PENSION, LIFE, FIN_RESERVE, …, DEFAULT).
          example: PENSION
        filename:
          type: string
          example: PENSION.png
        r2_object_key:
          type: string
          description: Ключ в R2 после `npm run seed:pdf-goal-cards-r2`.
          example: pdf-report-goal-cards/PENSION.png
        public_url:
          type: string
          nullable: true
          format: uri
          description: Публичный URL (CDN). `null`, если не задан `R2_PUBLIC_*` на сервере или файл не залит.
        repo_relative_path:
          type: string
          example: assets/reports/goal-cards/PENSION.png

    GoalCardAssetsManifest:
      type: object
      description: Манифест для ЛК; не хранится в БД, не принимается в PATCH.
      readOnly: true
      required:
        - version
        - editable
        - r2_key_prefix
        - directory_repo_relative
        - hint
        - cards
      properties:
        version:
          type: integer
          example: 1
        editable:
          type: boolean
          enum: [false]
          description: Замена картинок только через релиз/seed на бэке.
        r2_key_prefix:
          type: string
          example: pdf-report-goal-cards
        directory_repo_relative:
          type: string
          example: assets/reports/goal-cards
        hint:
          type: string
        cards:
          type: array
          items:
            $ref: '#/components/schemas/GoalCardAssetItem'

    PdfCoverSettings:
      type: object
      properties:
        cover_background_url:
          type: string
          nullable: true
          description: |
            URL картинки (https://…) или путь от **корня репозитория** на сервере (например `assets/reports/rostech/cover-background.jpg`).
            Пустая строка в PATCH сбрасывает к дефолтному фону.
          maxLength: 2048
        cover_title:
          type: string
          description: Текст в цветной плашке (по умолчанию как в Figma «Отчет» — «персональное финансовое решение»).
          example: персональное финансовое решение
          maxLength: 500
        title_band_color:
          type: string
          description: Цвет фона плашки под заголовком, формат #RRGGBB.
          pattern: '^#[0-9A-Fa-f]{6}$'
          example: '#722257'
        date_preview:
          type: string
          description: Как сейчас отформатировалась бы дата на обложке (Europe/Moscow или REPORT_PDF_TZ). Только для отображения в ЛК, в БД не сохраняется.
          readOnly: true
          example: '20 марта 2026 г.'
        cover_layout:
          type: object
          description: |
            Полная спека превью/PDF: размеры канваса, слой фона, два градиента (как в Figma), плашка заголовка с **уже подставленным** `title_band.background`,
            типографика заголовка и даты, `content` (текущий заголовок и дата), `background` (`uses_custom_upload`, `fallback_repo_relative_path` — без дубля URL),
            `pdf.default_font_repo_relative_path`. **Картинку фона брать только из корня ответа `cover_background_url`** (или GET cover-image).
            Совпадает с тем, что рендерит `buildReportCoverHtml` на бэке — фронт не должен хардкодить отступы и ширину плашки.
          readOnly: true
          additionalProperties: true
        summary_background_url:
          type: string
          nullable: true
          description: |
            Фон страницы «Сводная информация» после загрузки (POST summary-background) или путь от корня репо.
            Пустая строка в PATCH — градиент по умолчанию без своей картинки.
          maxLength: 2048
        summary_logo_url:
          type: string
          nullable: true
          description: Логотип на сводной странице (POST summary-logo). Пустая строка — сток из макета.
          maxLength: 2048
        summary_chart_color:
          type: string
          description: |
            Цвет графиков (будущие диаграммы) и акцента заголовков секций на сводной (#RRGGBB).
            Если задан только устаревший `summary_accent_color` в БД — он учитывается как запасной вариант до миграции ЛК.
          pattern: '^#[0-9A-Fa-f]{6}$'
          example: '#8b5cf6'
        summary_ai_avatar_url:
          type: string
          nullable: true
          description: Устарело; в ЛК не редактируется — аватар ИИ из стока. Поле может остаться в БД.
          maxLength: 2048
        summary_accent_color:
          type: string
          nullable: true
          description: Устарело в пользу `summary_chart_color`; при отсутствии chart в БД значение может подмешиваться в ответ.
          pattern: '^#[0-9A-Fa-f]{6}$'
        summary_layout:
          type: object
          description: |
            Спека второй страницы: A4, `branding.chart_color`, `uses_custom_summary_background`, `uses_custom_logo`, goal-cards.
            Картинки — корневые `summary_background_url`, `summary_logo_url` или GET summary-*-image (signed при R2_SIGN_COVER_URL).
          readOnly: true
          additionalProperties: true
        goal_card_assets:
          $ref: '#/components/schemas/GoalCardAssetsManifest'

    PdfCoverSettingsResponse:
      allOf:
        - type: object
          required:
            - editor_schema
          properties:
            editor_schema:
              type: object
              description: |
                Схема для ЛК: шаблоны, поля, типы (image/text/color/readonly), пути API и дефолты.
                Фронт может построить экран настроек без хардкода полей.
        - $ref: '#/components/schemas/PdfCoverSettings'

    PdfCoverSettingsPatch:
      type: object
      minProperties: 1
      properties:
        cover_background_url:
          type: string
          nullable: true
          maxLength: 2048
        cover_title:
          type: string
          nullable: true
          maxLength: 500
        title_band_color:
          type: string
          nullable: true
          description: '#RRGGBB; пусто/null — сброс к дефолту'
        summary_background_url:
          type: string
          nullable: true
          maxLength: 2048
        summary_logo_url:
          type: string
          nullable: true
          maxLength: 2048
        summary_chart_color:
          type: string
          nullable: true
          description: '#RRGGBB; пусто/null — сброс к дефолту'
        summary_ai_avatar_url:
          type: string
          nullable: true
          maxLength: 2048
        summary_accent_color:
          type: string
          nullable: true
          description: 'legacy #RRGGBB'

paths:
  /pfp/pdf-settings:
    get:
      operationId: getPdfCoverSettings
      summary: Получить настройки PDF-отчёта (обложка + сводная страница) для текущего агента
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      responses:
        '200':
          description: Настройки + `editor_schema` для экрана ЛК
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfCoverSettingsResponse'
        '401':
          description: Нет токена
        '403':
          description: У пользователя нет привязки к агенту (agent_id)
        '404':
          description: Агент не найден в проекте

    patch:
      operationId: patchPdfCoverSettings
      summary: Частично обновить настройки PDF-отчёта (обложка и/или сводная страница)
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PdfCoverSettingsPatch'
            examples:
              colors:
                value:
                  title_band_color: '#1a4d8c'
              resetBackground:
                value:
                  cover_background_url: ''
      responses:
        '200':
          description: Обновлённые настройки + актуальный `editor_schema`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfCoverSettingsResponse'
        '400':
          description: Ошибка валидации
        '401':
          description: Нет токена
        '403':
          description: Нет agent_id
        '404':
          description: Агент не найден в проекте

  /pfp/pdf-settings/cover-background:
    post:
      operationId: uploadPdfCoverBackground
      summary: Загрузить фон обложки (картинка)
      description: |
        `multipart/form-data`, поле **`image`** (jpeg/png/webp, до 8 МБ).
        При настроенном R2 (ключи + бакет) файл идёт в **Cloudflare R2**; в ответе `storage: r2` и публичный `url` на `R2_PUBLIC_*`.
        Если ключи R2 есть, но нет `R2_PUBLIC_BASE_URL` / `R2_CDN_BASE_URL` / `R2_PUBLIC_DOMAIN` — **503** (`R2_PUBLIC_URL_MISSING`), фолбэк на диск **не** используется.
        Фолбэк `/uploads/pdf-report-covers/...` только если R2 **не сконфигурирован** (и не задано `STORAGE_REQUIRE_R2=1`).
        URL сразу записывается в `cover_background_url` агента.
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: URL файла и полный ответ настроек
          content:
            application/json:
              schema:
                type: object
                required:
                  - url
                  - editor_schema
                  - cover_title
                  - title_band_color
                  - date_preview
                properties:
                  url:
                    type: string
                    format: uri
                  storage:
                    type: string
                    enum: [r2, local_disk]
                    description: Откуда реально отдан файл
                  editor_schema:
                    type: object
        '503':
          description: R2 обязателен или Put/публичный URL недоступны (`R2_PUBLIC_URL_MISSING`, `R2_PUT_FAILED`, `STORAGE_R2_REQUIRED`)
        '400':
          description: Нет файла / неверный тип / слишком большой файл
        '401':
          description: Нет токена
        '403':
          description: Нет agent_id
        '404':
          description: Агент не найден в проекте
        '503':
          description: STORAGE_REQUIRE_R2, а R2 недоступен

  /pfp/pdf-settings/cover-image:
    get:
      operationId: getPdfCoverImageUrl
      summary: URL фона обложки для превью (прямой или signed R2)
      description: |
        Ссылка для `<img src>` в ЛК. Обычно совпадает с `cover_background_url` (`access: direct`).
        При `R2_SIGN_COVER_URL=1` и распознанном префиксе `R2_PUBLIC_*` — временная подпись (`access: signed`, `expires_in`, `expires_at`).
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - url
                  - access
                properties:
                  url:
                    type: string
                  access:
                    type: string
                    enum: [direct, signed]
                  expires_in:
                    type: integer
                    nullable: true
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
        '401':
          description: Нет токена
        '403':
          description: Нет agent_id
        '404':
          description: Фон не задан или агент не найден

  /pfp/pdf-settings/summary-background:
    post:
      operationId: uploadPdfSummaryBackground
      summary: Загрузить фон страницы «Сводная информация»
      description: |
        `multipart/form-data`, поле **`image`** (jpeg/png/webp, до 8 МБ). Ключ R2: `pdf-report-summary/{projectId|common}/{agentId}/background_{timestamp}{ext}`.
        URL записывается в `summary_background_url`.
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: URL и полный ответ настроек
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Нет файла / тип / размер
        '503':
          description: R2 / STORAGE_REQUIRE_R2

  /pfp/pdf-settings/summary-logo:
    post:
      operationId: uploadPdfSummaryLogo
      summary: Загрузить логотип для сводной страницы
      description: |
        Поле **`image`**. Ключ R2: `pdf-report-summary/.../logo_{timestamp}{ext}`. URL в `summary_logo_url`.
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: OK
        '400':
          description: Ошибка загрузки
        '503':
          description: R2

  /pfp/pdf-settings/summary-background-image:
    get:
      operationId: getPdfSummaryBackgroundImageUrl
      summary: URL фона сводной для превью (direct или signed)
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, access]
                properties:
                  url: { type: string }
                  access: { type: string, enum: [direct, signed] }
                  expires_in: { type: integer, nullable: true }
                  expires_at: { type: string, format: date-time, nullable: true }
        '404':
          description: Фон сводной не задан

  /pfp/pdf-settings/summary-logo-image:
    get:
      operationId: getPdfSummaryLogoImageUrl
      summary: URL логотипа сводной для превью (direct или signed)
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, access]
                properties:
                  url: { type: string }
                  access: { type: string, enum: [direct, signed] }
                  expires_in: { type: integer, nullable: true }
                  expires_at: { type: string, format: date-time, nullable: true }
        '404':
          description: Логотип не задан

  /pfp/pdf-settings/summary-preview-html:
    get:
      operationId: getPdfSummaryPreviewHtml
      summary: HTML-превью страницы «Сводная информация» (мок-данные + настройки агента)
      description: |
        Возвращает **полный HTML** (`text/html`) одной страницы A4: фиксированный пример клиента и целей из `previewMockPayload.json`,
        плюс текущие `summary_background_url`, `summary_logo_url`, `summary_chart_color` агента.
        ЛК: `<iframe src="…" />` с заголовком `Authorization: Bearer …` не подставит токен — открывайте в новой вкладке, проксируйте с бэка или используйте `srcdoc` после fetch с токеном.
      tags:
        - PDF settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectKeyHeader'
      responses:
        '200':
          description: HTML-документ
          content:
            text/html:
              schema:
                type: string
        '401':
          description: Нет токена
        '403':
          description: Нет agent_id
        '404':
          description: Агент не найден в проекте
