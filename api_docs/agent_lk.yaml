        min_contribution:
          type: number
          nullable: true
        risk_profile:
          type: string
          enum: [conservative, balanced, aggressive]
        description:
          type: string
          nullable: true
        portfolio:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/ComonPortfolioItem"

    AgentComonStrategyCard:
      type: object
      properties:
        id:
          type: integer
          format: int64
        agent_id:
          type: integer
          format: int64
        comon_strategy_id:
          type: string
        comon_url:
          type: string
          nullable: true
        comon_profit_api_url:
          type: string
          nullable: true
          description: Публичный URL API Comon для графика
        name:
          type: string
        min_contribution:
          type: number
          nullable: true
        risk_profile:
          type: string
        description:
          type: string
          nullable: true
        portfolio:
          type: array
          items:
            $ref: "#/components/schemas/ComonPortfolioItem"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentComonStrategyListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/AgentComonStrategyCard"
        risk_profiles:
          type: array
          items:
            type: string
          example: [conservative, balanced, aggressive]

    AgentComonStrategyOneResponse:
      type: object
      properties:
        success:
