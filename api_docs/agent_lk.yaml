openapi: 3.0.0
info:
  title: Agent LK API (Личный кабинет агента)
  description: |
    API для управления инвестиционными продуктами и портфелями со стороны Агента.
    Авторизация происходит через стандартный `/api/auth/login`. 
    Все методы работают с привязкой к `project_id` авторизованного агента.
    Системные (дефолтные) продукты и портфели (где `project_id == null`) доступны Агенту только на чтение и клонирование.

    **Настройки PDF-отчёта** (обложка, сводная, `goal_card_assets` для превью карточек целей): отдельная спека **`openapi/PDFsettings.yaml`**, Swagger UI: `/api-docs-pdf-settings`, префикс путей `/api/pfp/pdf-settings`.

    **Resolut (AV Inform) для ЛК:** отдельная спека **`docs/api/pfp_resolut.yaml`** (прокси `products/quote/client/portfolio/link`, `plan-quotes` / `plan-publish-preview` / `publish-from-plan`, `suggest-quote-line`, `publish-preview` / `publish` / `publications`).

    **AI B2C в ЛК агента — два независимых набора контекстов:**
    - **Site** — `/pfp/ai-b2c/brain-contexts`, `/pfp/ai-b2c/stages` (клиентский сайт: обычный чат и dynamic-flow).
    - **chat_AI** — `/pfp/ai-b2c-chat/brain-contexts`, `/pfp/ai-b2c-chat/stages` (отдельный endpoint клиента `POST /my/ai-b2c/chat_AI/stream`, своя история в БД).
    У **каждой стадии** два поля: `content` (промпт второго ИИ — ответ пользователю) и `command_context_text` (правила первого ИИ — команды `/…` для перехода на другую стадию). Если `command_context_text` пустой, роутер использует глобальный `dynamic_context_text` из `GET/PUT /pfp/ai-b2c/settings`.
    Схемы тел запросов: **`docs/api/aiB2c.yaml`** (`AiB2cBrainContextCreate`, `AiB2cStageCreate`, …).

    **Конструктор ИИ (бот для клиентов, CJM-команды, brain-contexts):** префикс **`/pfp/constructor`**. Регистрация бота (Telegram / MAX и др.), шаблоны команд сценария (`GET/POST/PUT/DELETE …/commands`), дополнительные контексты (`…/brain-contexts`), клиенты и переписка. Алиасы путей для совместимости: `templates`, `constructor_commands`, `constructor_brain_contexts` — те же обработчики, что и у `commands` / `brain-contexts`. Вебхук MAX: `POST /api/pfp/constructor/webhook/max/{botId}` (без JWT, секрет в заголовке при настройке бота).

    **Расчёт ПФП и налоги (для сценариев агента):**
    - **`POST /client/calculate`** — stateless-расчёт по массиву целей; в ответе в т.ч. агрегаты налоговых льгот (`summary.tax_benefits_summary`). Контекст проекта: заголовок **`x-project-key`** и/или опционально **`Authorization: Bearer`** (из JWT берётся `projectId`).
    - **`POST /client/tax-planning/calculate`** — только расширенное налоговое планирование (имущественный вычет, %% ипотеки, соцвычет до 150k, дети); **без** массива `goals`. Требуется JWT агента (как у `first-run`).
    Полные схемы тел: **`openapi/pfp-api.yaml`** (`CalculationRequest`, `TaxPlanningRequest`). В этой спеке — тег **«Расчёт ПФП и налоги»**.
    Для карточки клиента кредиты передаются как `liabilities` (основной контракт) либо как алиас `credits` (`type`, `balance`, `monthlyPayment`, `rate`) с серверным маппингом в `liabilities`.

    **NDA (соглашение о неразглашении):** тело `NdaSendRequestBody` — обязательны `client_email`, `client_full_name`, `client_phone`, `client_birth_date`, `client_gender` (`male`/`female`, только для текста письма).
    - **`POST /pfp/clients/nda/send`** — клиента в БД ещё нет (до first-run), только JWT агента.
    - **`POST /pfp/clients/{clientId}/nda/send`** — клиент уже есть; проверяется привязка к агенту.
  version: 1.0.0
servers:
  - url: /api
    description: Main API server

security:
  - bearerAuth: []

paths:
  # ==================== ПРОДУКТЫ ====================
  /pfp/products:
    get:
      tags: [ "Продукты Агента" ]
      summary: Получить список продуктов
      parameters:
        - name: includeDefaults
          in: query
          schema: { type: boolean, default: true }
          description: Включать ли в выдачу системные дефолтные продукты
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/Product'
    post:
      tags: [ "Продукты Агента" ]
      summary: Создать новый продукт в своем проекте
      description: |
        Тело — схема `ProductCreate` в `openapi/OPENAPI_SPEC.yaml`. Для проекта AV/Резолют опционально передайте `resolut_pfp_code` и `resolut_quote_p_type` (см. описание полей в схеме); затем этот продукт можно добавить в портфель как обычный инструмент (`product_id` + доля).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Создано
          
  /pfp/products/{id}:
    get:
      tags: [ "Продукты Агента" ]
      summary: Получить продукт по ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
    put:
      tags: [ "Продукты Агента" ]
      summary: Редактировать свой продукт
      description: |
        Ошибка 403, если попытка изменить системный дефолтный продукт.
        Поля `resolut_pfp_code` / `resolut_quote_p_type` — см. `ProductCreate` в `openapi/OPENAPI_SPEC.yaml`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/ProductCreate'
    delete:
      tags: [ "Продукты Агента" ]
      summary: Удалить свой продукт
      description: Ошибка 403, если попытка удалить системный дефолтный продукт
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /pfp/products/{id}/clone:
    post:
      tags: [ "Продукты Агента" ]
      summary: Клонировать продукт к себе в проект
      description: Агент может клонировать системные продукты к себе, чтобы потом редактировать их копию
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /pfp/product-types:
    get:
      tags: [ "Продукты Агента (Справочники)" ]
      summary: Получить список типов продуктов

  # ==================== RESOLUT (AV Inform, project 23) ====================
  /pfp/resolut/products:
    post:
      tags: [ "Resolut (оформление)" ]
      summary: Получить список доступных Resolut-продуктов для агента
      description: |
        Проксирует upstream `operation=products`.
        Требует JWT и контекст проекта `RESOLUT_PROJECT_ID` (обычно 23).
        Bearer в Resolut берется из in-memory сессии после `/api/pfp/auth/login`,
        fallback: `resolut_static_key` / `RESOLUT_STATIC_KEY`.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Нормализованный ответ Resolut
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  operation: { type: string, example: products }
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  err:
                    type: object
                    nullable: true
                    properties:
                      code: { type: string, nullable: true }
                      message: { type: string, nullable: true }
                      upstream_status: { type: integer, nullable: true }

  /pfp/resolut/quote:
    post:
      tags: [ "Resolut (оформление)" ]
      summary: Котировка продукта Resolut
      description: |
        Проксирует upstream `operation=quote`.
        Для портфельного сценария AV используйте продукт `assetShort`,
        обычно `pType=0` (единовременный взнос).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ code, parameters ]
              properties:
                code:
                  type: string
                  example: assetShort
                parameters:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Нормализованный ответ Resolut
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  operation: { type: string, example: quote }
                  data:
                    type: object
                    nullable: true
                    additionalProperties: true
                  err:
                    type: object
                    nullable: true
                    properties:
                      code: { type: string, nullable: true }
                      message: { type: string, nullable: true }
                      upstream_status: { type: integer, nullable: true }

  /pfp/resolut/client:
    post:
      tags: [ "Resolut (оформление)" ]
      summary: Создать/обновить клиента в Resolut
      description: |
        Проксирует upstream `operation=client` (POST).
        Режимы:
        - create: без `code` (обязательны `lastName`, `firstName`, `dob`, `sex`, `phone`, `email`);
        - update: с `code` и минимум одним дополнительным полем.

        Практика для фронта: брать данные из карточки клиента PFP и доспрашивать только
        недостающие поля для Resolut. Маппинг:
        - `clients.last_name` -> `lastName`
        - `clients.first_name` -> `firstName`
        - `clients.middle_name` -> `middleName`
        - `clients.birth_date` -> `dob` (формат `DD.MM.YYYY`)
        - `clients.gender`/`sex` -> `sex` (`male`/`female`)
        - `clients.phone` -> `phone`
        - `clients.email` -> `email`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  oneOf:
                    - type: string
                    - type: integer
                lastName: { type: string }
                firstName: { type: string }
                middleName: { type: string, nullable: true }
                dob:
                  type: string
                  description: Дата рождения в формате DD.MM.YYYY
                  example: "01.01.1985"
                sex:
                  type: string
                  enum: [ male, female ]
                phone: { type: string }
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Нормализованный ответ Resolut
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  operation: { type: string, example: client }
                  data:
                    type: object
                    nullable: true
                    additionalProperties: true
                  err:
                    type: object
                    nullable: true
                    properties:
                      code: { type: string, nullable: true }
                      message: { type: string, nullable: true }
                      upstream_status: { type: integer, nullable: true }
    get:
      tags: [ "Resolut (оформление)" ]
      summary: Получить клиента в Resolut по code
      parameters:
        - name: code
          in: query
          required: true
          schema:
            oneOf:
              - type: string
              - type: integer
          description: ID клиента в Resolut
      responses:
        '200':
          description: Нормализованный ответ Resolut

  /pfp/resolut/portfolio:
    post:
      tags: [ "Resolut (оформление)" ]
      summary: Опубликовать портфель в Resolut (создать заявки/договоры)
      description: |
        Проксирует upstream `operation=portfolio`.
        Resolut пересчитывает котировки на своей стороне при публикации.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ quotes, client ]
              properties:
                quotes:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [ code, parameters ]
                    properties:
                      code: { type: string }
                      parameters:
                        type: object
                        additionalProperties: true
                client:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Нормализованный ответ Resolut
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  operation: { type: string, example: portfolio }
                  data:
                    type: object
                    nullable: true
                    additionalProperties: true
                  err:
                    type: object
                    nullable: true
                    properties:
                      code: { type: string, nullable: true }
                      message: { type: string, nullable: true }
                      upstream_status: { type: integer, nullable: true }

  /pfp/resolut/link:
    get:
      tags: [ "Resolut (оформление)" ]
      summary: Получить одноразовую ссылку перехода в Resolut
      description: |
        Проксирует upstream `operation=link` (GET).
        Ссылка короткоживущая (~20 секунд), запрашивайте по клику в UI.
      responses:
        '200':
          description: Нормализованный ответ Resolut
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  operation: { type: string, example: link }
                  data:
                    type: string
                    nullable: true
                    example: https://demo.avinfors.ru/pfp/?pfp=abc123
                  err:
                    type: object
                    nullable: true
                    properties:
                      code: { type: string, nullable: true }
                      message: { type: string, nullable: true }
                      upstream_status: { type: integer, nullable: true }

  # ==================== ПОРТФЕЛИ ====================
  /pfp/portfolios:
    get:
      tags: [ "Портфели Агента" ]
      summary: Получить список портфелей
      parameters:
        - name: includeDefaults
          in: query
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/Portfolio'
    post:
      tags: [ "Портфели Агента" ]
      summary: Создать новый портфель в своем проекте
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/Portfolio'

  /pfp/portfolios/{id}:
    get:
      tags: [ "Портфели Агента" ]
      summary: Получить портфель по ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
    put:
      tags: [ "Портфели Агента" ]
      summary: Редактировать свой портфель
      description: Ошибка 403, если попытка изменить системный портфель
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/PortfolioUpdate'
    delete:
      tags: [ "Портфели Агента" ]
      summary: Удалить свой портфель
      description: Ошибка 403, если попытка удалить системный портфель
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /pfp/portfolios/{id}/clone:
    post:
      tags: [ "Портфели Агента" ]
      summary: Клонировать портфель к себе в проект
      description: Агент может взять системный портфель и скопировать в свой проект для редактирования
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }

  /pfp/portfolios/classes:
    get:
      tags: [ "Портфели Агента (Справочники)" ]
      summary: Получить классы портфелей (для мультиселектов)

  # ==================== НАСТРОЙКИ ПЛАНОВ (ИНФЛЯЦИЯ И ДР.) ====================
  /pfp/settings:
    get:
      tags: [ "Настройки планов и проекта" ]
      summary: Получить список настроек проекта
      description: |
        Возвращает список системных настроек проекта (в т.ч. влияющих на расчёты финансовых планов).
        Важные для ЛК Агента ключи:
        - **inflation_rate_matrix** — матрица инфляции по месяцам горизонта (объект с полем ranges).
          Диапазоны создаёт Агент при настройке проекта; в системе нет дефолтной матрицы.
          Каждый диапазон: fromMonth, toMonthExcl, rateAnnual (годовая %). Для месяцев вне диапазонов используется ставка последнего диапазона.
        - **inflation_rate_year** — одна годовая инфляция % (используется, если матрица не задана).
        - **investment_expense_growth_annual** — рост расходов на инвестиции (% годовых); в расчётах переводится в месячную. Если не задан — используется investment_expense_growth_monthly (% в месяц).
        - прочие ключи категорий `calculation`, `pension`, `passive-income` и т.д.
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Фильтр по категории (calculation, pension, passive-income и т.п.)
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/SystemSetting'

  /pfp/settings/{key}:
    get:
      tags: [ "Настройки планов и проекта" ]
      summary: Получить настройку по ключу
      description: |
        Возвращает конкретную настройку по ключу.
        Ключи инфляции для расчётов:
        - **inflation_rate_matrix** — объект по схеме InflationRateMatrix (см. OPENAPI_SPEC.yaml):
          value.ranges — массив { fromMonth, toMonthExcl, rateAnnual }. Годовая ставка в %; бэкенд переводит в месячную по формуле (1 + rateAnnual/100)^(1/12) - 1.
        - **inflation_rate_year** — число, одна годовая инфляция % (fallback при отсутствии матрицы).
        - **investment_expense_growth_annual** — число, рост расходов на инвестиции в % годовых (в расчётах — месячная доля).
        - **investment_expense_growth_monthly** — число, рост расходов на инвестиции в % в месяц (fallback).
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          example: inflation_rate_matrix
      responses:
        '200':
          description: Найдена
          content:
            application/json:
              schema:
                $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/SystemSetting'
        '404':
          description: Настройка не найдена
    put:
      tags: [ "Настройки планов и проекта" ]
      summary: Обновить значение настройки
      description: |
        Обновляет значение настройки по ключу.
        Для **inflation_rate_matrix** передайте в value объект: { "ranges": [ { "fromMonth", "toMonthExcl", "rateAnnual" }, ... ] }.
        Диапазоны создаёт Агент (нет поля «по умолчанию»); месяцы вне диапазонов получают ставку последнего диапазона.
        Для **inflation_rate_year** передайте число (одна годовая %).
        Для **investment_expense_growth_annual** — число (рост расходов на инвестиции в % годовых); в расчётах переводится в месячную.
        В проде доступ может быть ограничен ролями (admin/super_admin).
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          example: inflation_rate_matrix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - value
              properties:
                value:
                  oneOf:
                    - type: string
                    - type: number
                    - type: object
            examples:
              inflation_matrix:
                summary: Матрица инфляции по месяцам (создаётся Агентом)
                value:
                  value:
                    ranges:
                      - fromMonth: 0
                        toMonthExcl: 12
                        rateAnnual: 7.5
                      - fromMonth: 12
                        toMonthExcl: 24
                        rateAnnual: 6.7
                      - fromMonth: 24
                        toMonthExcl: 48
                        rateAnnual: 6.0
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/SystemSetting'
        '403':
          description: Нет прав на изменение настройки
        '404':
          description: Настройка не найдена

  # ==================== РАСЧЁТ ПФП И НАЛОГОВОЕ ПЛАНИРОВАНИЕ ====================
  /client/calculate:
    post:
      tags: [ "Расчёт ПФП и налоги" ]
      summary: Stateless-расчёт финансового плана по целям (без сохранения клиента)
      description: |
        Симуляция одной или нескольких целей (пенсия, крупная покупка, НСЖ, инвестиции и т.д.).
        В ответе — в том числе **`summary.tax_benefits_summary`** (ПДС, ИИС, дети, НСЖ, итоги).

        **Контекст проекта (`project_id`):**
        - заголовок **`x-project-key`** — публичный ключ проекта (`projects.public_key`);
        - и/или опционально **`Authorization: Bearer`** — JWT агента; из токена берётся `projectId` (удобно из ЛК без копирования ключа).

        Если проект не определён — ответ **`400`** с текстом вроде **`Project context is missing`**.

        Сохранение клиента и целей в БД — отдельно **`POST /client/first-run`** (JWT обязателен).
      security: []
      parameters:
        - name: x-project-key
          in: header
          required: false
          schema: { type: string }
          description: Публичный ключ проекта, если контекст не задаётся через JWT
        - name: Authorization
          in: header
          required: false
          schema: { type: string }
          description: Опционально `Bearer <token>` агента для подстановки `projectId`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../openapi/pfp-api.yaml#/components/schemas/CalculationRequest'
      responses:
        '200':
          description: План и цели (упрощённый ответ калькулятора)
          content:
            application/json:
              schema:
                $ref: '../../openapi/pfp-api.yaml#/components/schemas/CalculationResponse'
        '400':
          description: Ошибка валидации Joi или отсутствует контекст проекта

  /client/tax-planning/calculate:
    post:
      tags: [ "Расчёт ПФП и налоги" ]
      summary: Расширенное налоговое планирование (имущество, ипотека, соцвычет, дети)
      description: |
        Калькулятор **без массива `goals`**: оценка эффекта вычетов по заявленным базам
        (имущественный до 2M ₽, проценты по ипотеке до 3M ₽, социальный до 150k ₽)
        и стандартного вычета на детей (`tax_children`, режим семьи **`tax_family_mode`**: `single` | `both_parents` | `single_parent_double`).

        Пенсия, ИИС, ПДС в симуляции целей и внешний расчёт НСЖ **сюда не входят** — для этого используйте **`POST /client/calculate`** или **`POST /client/first-run`**.

        Схемы полей — **`TaxPlanningRequest`** / **`TaxPlanningResponse`** в `openapi/pfp-api.yaml`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../openapi/pfp-api.yaml#/components/schemas/TaxPlanningRequest'
      responses:
        '200':
          description: Принятые базы вычетов, НДФЛ до/после, потенциальный возврат по основному лицу и супругу
          content:
            application/json:
              schema:
                $ref: '../../openapi/pfp-api.yaml#/components/schemas/TaxPlanningResponse'
        '400':
          description: Ошибка валидации

  # ==================== КЛИЕНТЫ B2C И ИХ ПЛАНЫ ====================
  /pfp/clients:
    get:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Список клиентов агента (B2C / CRM-хаб)
      description: |
        Пагинированный список клиентов проекта. По умолчанию — только клиенты текущего агента (`agent_id` из JWT).

        Если в настройках проекта включено «все агенты видят всех» (`settings.agents_see_all_clients` или `client_visibility: all`),
        возвращаются все клиенты проекта; у записи может быть поле `owner_label` (метка владельца: B2C / email агента / ФИО).

        В каждом элементе `data[]` два массива истории (одинаковый формат сообщений):
        - **`chat_ai_messages`** — отдельный поток **chat_AI** (`POST /my/ai-b2c/chat_AI/stream`, таблица `ai_b2c_chat_ai_messages`).
        - **`b2c_site_chat_messages`** — обычный B2C-чат на сайте (`POST /my/ai-b2c/chat/stream`, таблица `ai_b2c_chat_messages`).
        - **`constructor_site_chat_messages`** — чат конструктора на лендинге (`POST /pfp/constructor/site-chat/stream`), история из `constructor_logs`;
          при первом сообщении пользователя бэкенд создаёт запись в `clients` и связывает её с `constructor_clients.pfp_client_id`, чтобы агент видел диалог **до** расчёта ПФП.
        Пустые массивы, если по каналу не было переписки или выключена подгрузка (`include_chat_ai=false`).
        Клиенты без целей / без расчёта в списке остаются — как и раньше.
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50 }
          description: Размер страницы. `0` или `all` — вернуть всех без пагинации.
        - name: sort
          in: query
          required: false
          schema: { type: string, default: created_at }
        - name: order
          in: query
          required: false
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Поиск по имени, фамилии, email, телефону, external_uuid
        - name: include_chat_ai
          in: query
          required: false
          schema: { type: string, enum: ['0', '1', 'true', 'false'], default: '1' }
          description: |
            Подгружать обе истории (`chat_ai_messages` и `b2c_site_chat_messages`). Значения `0` или `false` — не ходить в БД
            (оба массива будут `[]` у каждого клиента).
        - name: chat_ai_limit
          in: query
          required: false
          schema: { type: integer, default: 200, minimum: 1, maximum: 500 }
          description: Сколько последних сообщений **на каждый канал** (site и chat_AI) на одного клиента в этой выдаче (макс. 500).
      responses:
        '200':
          description: Список клиентов и пагинация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentClientsListResponse'
        '400':
          description: Нет agent_id в токене

  /pfp/clients/{clientId}/plans:
    get:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Карточка клиента (тот же контракт, что GET /client/{id})
      description: |
        **Фактическое поведение бэка:** возвращается **полная карточка клиента** (профиль, цели, активы, `goals_summary` в упрощённом виде),
        а не отдельный массив «планов». Используйте `goals` и агрегаты для выбора сценария работы.
        Для риск-профиля также возвращаются поля:
        `risk_profile_answers`, `risk_questionnaire_version_id`, `risk_profile_result`
        (результат новой методики BaseScore + BehaviorScore).

        Истории чатов по умолчанию **не** подмешиваются (чтобы не дублировать тяжёлый запрос при открытии этого URL).
        Чтобы получить **`chat_ai_messages`** и **`b2c_site_chat_messages`** — передайте `include_chat_ai=true` (или откройте `GET /client/{clientId}` с теми же query).
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: include_chat_ai
          in: query
          required: false
          schema: { type: string, enum: ['0', '1', 'true', 'false'], default: '0' }
          description: Принудительно подгрузить оба массива истории (по умолчанию для этого маршрута — пустые массивы без запроса к БД).
        - name: chat_ai_limit
          in: query
          required: false
          schema: { type: integer, default: 500, minimum: 1, maximum: 2000 }
          description: Лимит сообщений **на каждый канал** (site и chat_AI), если включено `include_chat_ai=true`.
      responses:
        '200':
          description: Объект клиента (карточка)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentClientCardResponse'
        '404':
          description: Клиент не найден

  /pfp/clients/{clientId}/plans/{planId}/take-over:
    post:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Подхватить (продолжить) финансовый план клиента из B2C в ЛК Агента
      description: |
        Позволяет Агента «забрать» существующий финансовый план клиента, созданный в B2C ЛК,
        и продолжать работу с этим планом уже из ЛК Агента (в т.ч. донастройка целей, продуктов и портфелей).
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: План успешно привязан к ЛК Агента
          content:
            application/json:
              schema:
                $ref: '../../openapi/OPENAPI_SPEC.yaml#/components/schemas/ClientPlan'
        '404':
          description: Клиент или план не найдены

  /pfp/clients/nda/send:
    post:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Отправить NDA без клиента в БД (до first-run)
      description: |
        То же тело, что у `POST …/clients/{clientId}/nda/send` (`NdaSendRequestBody`), но **без** `clientId` в пути — карточка клиента не нужна (например, до расчёта / first-run).
        Привязка к клиенту в БД не проверяется. PDF и письмо — как у второго маршрута.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NdaSendRequestBody'
      responses:
        '200':
          description: Успех — PDF сгенерирован, письмо отправлено (Resend)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NdaSendResponse'
        '400':
          description: Неполное/невалидное тело, нет подписи у агента
        '403':
          description: Нет agent_id в токене
        '404':
          description: Агент не найден
        '502':
          description: Не удалось загрузить подпись или отправить почту

  /pfp/clients/{clientId}/nda/send:
    post:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Отправить клиенту NDA (PDF на email)
      description: |
        Собирает PDF и отправляет на **`client_email`**. В теле — обязательные данные клиента (см. `NdaSendRequestBody`): ФИО, телефон, дата рождения и **`client_gender`** для обращения в письме («Уважаемый/Уважаемая …»); пол в PDF не подставляется.

        У агента в профиле должно быть изображение подписи. Текст соглашения и ссылки на оферту/политику ПДн задаются на бэкенде (`NDA_PUBLIC_OFFER_URL`, `NDA_PRIVACY_POLICY_URL`, `NDA_AGREEMENT_CITY` и т.д.).
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NdaSendRequestBody'
      responses:
        '200':
          description: Успех — PDF сгенерирован, письмо отправлено (Resend)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NdaSendResponse'
        '400':
          description: Неполное/невалидное тело (все поля клиента обязательны), нет подписи у агента
        '403':
          description: Нет agent_id в токене или доступ к клиенту запрещён
        '404':
          description: Клиент или агент не найден
        '502':
          description: Не удалось загрузить подпись или отправить почту

  /my/risk-profile/questionnaire:
    get:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Анкета риск-профиля для фронта (backend-driven)
      description: |
        Возвращает активную версию анкеты с вопросами, пояснениями и вариантами ответов.
        Фронт не должен хардкодить тексты/баллы.
      responses:
        '200':
          description: Активная анкета
          content:
            application/json:
              schema:
                type: object
                properties:
                  questionnaire:
                    $ref: '../../openapi/pfpB2C.yaml#/components/schemas/RiskQuestionnaire'

  /my/risk-profile/questionnaire-v2:
    get:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Человекочитаемая анкета риск-профиля (v2)
      description: |
        Возвращает активную версию анкеты в формате для прямого UI-рендера:
        вопросы/подсказки/варианты без score и без технических id.
      responses:
        '200':
          description: Активная анкета v2
          content:
            application/json:
              schema:
                type: object
                properties:
                  questionnaire:
                    type: object
                    properties:
                      id:
                        type: integer
                      code:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      questions:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                            title:
                              type: string
                            description:
                              type: string
                              nullable: true
                            help_text:
                              type: string
                              nullable: true
                            sort_order:
                              type: integer
                            options:
                              type: array
                              items:
                                type: object
                                properties:
                                  code:
                                    type: string
                                  label:
                                    type: string
                                  sort_order:
                                    type: integer

  /my/risk-profile/answers:
    get:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Текущие ответы и рассчитанный risk result клиента
      responses:
        '200':
          description: Ответы и результат скоринга
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskProfileAnswersResponse'
    post:
      tags: [ "Клиенты B2C в ЛК Агента" ]
      summary: Сохранить ответы риск-анкеты клиента
      description: |
        Сохраняет ответы анкеты (question_code -> option_code/score).
        Рекомендуется вызывать до `/my/plan/first-run` или `/my/plan/{goalId}/recalculate`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskProfileAnswersRequest'
      responses:
        '200':
          description: Ответы сохранены
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  risk_profile_answers:
                    type: object
                    additionalProperties:
                      oneOf:
                        - type: string
                        - type: integer
                  risk_questionnaire_version_id:
                    type: integer

  # ==================== AI CRM В ЛК АГЕНТА ====================
  /pfp/ai/assistants:
    get:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: Список доступных AI-ассистентов
      description: |
        Возвращает список активных ассистентов для ЛК агента.
        Поле `description` предназначено для UI (краткое описание), а не для полного system prompt.
      responses:
        '200':
          description: Список ассистентов
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    name: { type: string }
                    slug: { type: string }
                    description: { type: string }

  /pfp/ai/history/{assistant_id}:
    get:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: История чата с ассистентом
      description: |
        Возвращает последние сообщения по выбранному ассистенту.
        Для `ai-crm` действует авто-briefing:
        если история пустая или последнее сообщение старше 8 часов,
        бэкенд автоматически добавляет свежую CRM-сводку.
      parameters:
        - name: assistant_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: История сообщений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiAssistantChatMessage'

  /pfp/ai/chat:
    post:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: Отправить сообщение ассистенту
      description: |
        Принимает `assistant_id` и `message`.
        Ответ отдается стримом (SSE). Для совместимости доступен и `/pfp/ai/chat/stream`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assistant_id, message]
              properties:
                assistant_id: { type: integer }
                message: { type: string }
      responses:
        '200':
          description: Потоковый ответ SSE

  /pfp/ai/chat/stream:
    post:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: Алиас stream-чата с ассистентом
      description: Полностью эквивалентен `POST /pfp/ai/chat`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assistant_id, message]
              properties:
                assistant_id: { type: integer }
                message: { type: string }
      responses:
        '200':
          description: Потоковый ответ SSE

  /pfp/ai/plan-assistant/chat:
    post:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: Чат план-ассистента по конкретному клиенту
      description: |
        Специализированный чат для повторного входа в финансовый план после firstRun.
        Бэкенд на лету подмешивает контекст:
        - карточка клиента и `goals_summary`;
        - доступные продукты проекта;
        - доступные портфели проекта.
        
        История изолируется отдельным ассистентом (`ai-plan-assistant`) и не смешивается
        с обычным CRM-чатом.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiPlanAssistantChatRequest'
      responses:
        '200':
          description: Потоковый ответ SSE
        '400':
          description: Нет client_id/message или отсутствует project context
        '403':
          description: Нет доступа к клиенту
        '404':
          description: Клиент не найден

  /pfp/ai/agent-client/chat/stream:
    post:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: Потоковый чат ассистента по конкретному клиенту (изолированная история)
      description: |
        Специализированный поток для ЛК агента.
        На каждом запросе бэкенд:
        - загружает полный профиль клиента (`getFullClient`);
        - собирает runtime-контекст (профиль, family profile, цели, goals_summary, активы, обязательства, расходы);
        - отправляет запрос в OpenRouter;
        - возвращает ответ стримом (SSE);
        - сохраняет историю по ключу `agent_id + assistant_id + client_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiAgentClientChatRequest'
      responses:
        '200':
          description: Потоковый ответ SSE
        '400':
          description: Нет client_id/message или отсутствует project context
        '403':
          description: Нет доступа к клиенту
        '404':
          description: Клиент не найден

  /pfp/ai/agent-client/history/{client_id}:
    get:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: История агентского AI-чата по клиенту
      description: |
        Возвращает историю только в рамках конкретного клиента и ассистента.
        Если `assistant_id` не передан, backend автоматически использует ассистента `ai-agent-client-lk`.
      parameters:
        - name: client_id
          in: path
          required: true
          schema: { type: integer }
        - name: assistant_id
          in: query
          required: false
          schema: { type: integer }
      responses:
        '200':
          description: История сообщений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiAssistantChatMessage'
        '400':
          description: Не передан client_id

    delete:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: Очистить историю агентского AI-чата по клиенту
      parameters:
        - name: client_id
          in: path
          required: true
          schema: { type: integer }
        - name: assistant_id
          in: query
          required: false
          schema: { type: integer }
      responses:
        '200':
          description: История очищена
        '400':
          description: Не передан client_id

  /pfp/crm/briefing:
    get:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: Получить ежедневную CRM-сводку
      description: |
        Генерирует текстовый брифинг по клиентам агента
        (в первую очередь статусы THINKING и RENEWAL).
      responses:
        '200':
          description: Текст CRM-сводки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmBriefingResponse'

  /pfp/crm/status:
    post:
      tags: [ "AI CRM (ЛК Агента)" ]
      summary: Обновить CRM-статус клиента
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCrmUpdate'
      responses:
        '200':
          description: Статус обновлён

  # ==================== AI B2C В ЛК АГЕНТА (УПРАВЛЕНИЕ НАСТРОЙКАМИ) ====================
  /pfp/ai-b2c/brain-contexts:
    get:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Список brain-contexts для B2C AI в проекте Агента
      description: |
        Возвращает список brain-contexts (инструкций/контекстов) B2C AI, доступных в проекте Агента.
        Это обёртка над административными методами `/admin/ai-b2c/brain-contexts`, но со скоупом конкретного проекта/агента.
      responses:
        '200':
          description: Успешно
    post:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Создать новый brain-context для B2C AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './aiB2c.yaml#/components/schemas/AiB2cBrainContextCreate'
      responses:
        '201':
          description: Создано

  /pfp/ai-b2c/brain-contexts/{id}:
    put:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Обновить brain-context
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './aiB2c.yaml#/components/schemas/AiB2cBrainContextUpdate'
      responses:
        '200':
          description: Успешно обновлено
    delete:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Удалить brain-context
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Удалено

  /pfp/ai-b2c/stages:
    get:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Список стейджей (сценариев) B2C AI для проекта Агента (site)
      description: |
        Каждая запись: `stage_key`, `title`, **`content`** (промпт второго ИИ), **`command_context_text`** (промпт первого ИИ-роутера на этой стадии, опционально),
        `is_active`, `priority`. Не смешивать с префиксом `/pfp/ai-b2c-chat/…` — там отдельная копия для chat_AI.
      responses:
        '200':
          description: Успешно
    post:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Создать новый стейдж (site)
      description: |
        Обязательны `stage_key`, `title`, `content`. Опционально `command_context_text` — если задан, первый ИИ в dynamic-flow опирается на него; иначе — на `dynamic_context_text` из `/pfp/ai-b2c/settings`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './aiB2c.yaml#/components/schemas/AiB2cStageCreate'
      responses:
        '201':
          description: Создано

  /pfp/ai-b2c/stages/{id}:
    put:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Обновить стейдж (site)
      description: |
        Частичное обновление: можно передать, в том числе, `command_context_text` или обнулить его (роутер тогда снова возьмёт глобальный `dynamic_context_text`).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './aiB2c.yaml#/components/schemas/AiB2cStageUpdate'
      responses:
        '200':
          description: Успешно обновлено
    delete:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Удалить стейдж
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Удалено

  /pfp/ai-b2c-chat/brain-contexts:
    get:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Список brain-contexts для chat_AI B2C AI в проекте Агента
      description: |
        Отдельные записи от site: используются только потоком `POST /my/ai-b2c/chat_AI/stream`. Поля как у site brain-contexts: `title`, `content`, `is_active`, `priority`.
      responses:
        '200':
          description: Успешно
    post:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Создать новый brain-context для chat_AI B2C AI
      description: |
        Поддерживает два формата:
        1) `application/json` — обычное создание с полем `content`.
        2) `multipart/form-data` — можно передать файл в поле `document` (`pdf/doc/docx/txt/md/rtf`), текст будет извлечён и склеен в `content`.

        Правила:
        - обязателен `title`;
        - обязателен хотя бы один из: `content` или `document`;
        - лимит файла: 8MB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './aiB2c.yaml#/components/schemas/AiB2cBrainContextCreate'
          multipart/form-data:
            schema:
              type: object
              required: [ title ]
              properties:
                title:
                  type: string
                  description: Название brain-context
                content:
                  type: string
                  description: Базовый текст контекста (опционально, если передаётся document)
                is_active:
                  type: boolean
                  default: true
                priority:
                  type: integer
                  default: 0
                document:
                  type: string
                  format: binary
                  description: Файл для извлечения текста (pdf/doc/docx/txt/md/rtf)
      responses:
        '201':
          description: Создано
        '400':
          description: Невалидный payload, неподдерживаемый формат файла, превышен размер или не удалось извлечь текст

  /pfp/ai-b2c-chat/brain-contexts/{id}:
    put:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Обновить brain-context (chat_AI)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './aiB2c.yaml#/components/schemas/AiB2cBrainContextUpdate'
      responses:
        '200':
          description: Успешно обновлено
    delete:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Удалить brain-context (chat_AI)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Удалено

  /pfp/ai-b2c-chat/brain-contexts/{id}/documents:
    get:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Список документов brain-context (chat_AI)
      description: |
        Возвращает документы, загруженные в конкретный brain-context.
        По умолчанию только активные документы.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Список документов
    post:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Загрузить документ в brain-context (chat_AI)
      description: |
        Загружает файл, извлекает текст и сохраняет отдельным кусочком контекста.
        Поддержка: `pdf/doc/docx/txt/md/rtf`, лимит 8MB.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [ document ]
              properties:
                document:
                  type: string
                  format: binary
                  description: Файл для извлечения текста
      responses:
        '201':
          description: Документ загружен
        '400':
          description: Невалидный файл или не удалось извлечь текст
        '404':
          description: Brain-context не найден

  /pfp/ai-b2c-chat/brain-contexts/{id}/documents/{docId}:
    get:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Получить документ brain-context (chat_AI)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Документ с extracted_text
        '404':
          description: Документ или brain-context не найден
    delete:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Удалить документ brain-context (chat_AI)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Удалено
        '404':
          description: Документ или brain-context не найден

  /pfp/ai-b2c-chat/stages:
    get:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Список стейджей (сценариев) chat_AI B2C AI для проекта Агента
      description: |
        Структура как у site stages: **`content`** + **`command_context_text`**. Клиентский чат chat_AI читает только эту таблицу и свою историю.
      responses:
        '200':
          description: Успешно
    post:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Создать новый стейдж (chat_AI)
      description: |
        Как `POST /pfp/ai-b2c/stages`, но для chat_AI. Обязательны `stage_key`, `title`, `content`; опционально `command_context_text`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './aiB2c.yaml#/components/schemas/AiB2cStageCreate'
      responses:
        '201':
          description: Создано

  /pfp/ai-b2c-chat/stages/{id}:
    put:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Обновить стейдж (chat_AI)
      description: |
        В том числе правка `command_context_text` и `content` независимо друг от друга.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './aiB2c.yaml#/components/schemas/AiB2cStageUpdate'
      responses:
        '200':
          description: Успешно обновлено
    delete:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Удалить стейдж (chat_AI)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Удалено

  /pfp/ai-b2c/settings:
    get:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Получить настройки B2C AI ассистента
      description: |
        Возвращает настройки ассистента в рамках проекта агента:
        `display_name`, `avatar_url`, `tagline` и **`dynamic_context_text`** — глобальный текст для первого ИИ (роутер), если у текущей стадии не задан свой `command_context_text` (см. stages site и chat_AI).
      responses:
        '200':
          description: Настройки или null, если ещё не заданы
          content:
            application/json:
              schema:
                $ref: './aiB2c.yaml#/components/schemas/AiB2cSettings'
    put:
      tags: [ "AI B2C (настройки Агента)" ]
      summary: Обновить настройки B2C AI ассистента
      description: |
        Обновляет бренд и глобальный fallback роутера: `display_name`, `tagline`, **`dynamic_context_text`** (общий для site dynamic-flow и chat_AI, когда у стадии пустой `command_context_text`).
        `avatar_url` контролируется отдельным эндпоинтом `POST /pfp/ai-b2c/avatar-upload`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                tagline:
                  type: string
                dynamic_context_text:
                  type: string
      responses:
        '200':
          description: Настройки обновлены
          content:
            application/json:
              schema:
                $ref: './aiB2c.yaml#/components/schemas/AiB2cSettings'
        '201':
          description: Настройки созданы впервые
          content:
            application/json:
              schema:
                $ref: './aiB2c.yaml#/components/schemas/AiB2cSettings'

  # ==================== КОНСТРУКТОР ИИ (бот, команды CJM, brain-contexts) ====================
  /pfp/constructor/bot:
    post:
      tags: [ "Конструктор ИИ" ]
      summary: Зарегистрировать или обновить бота конструктора
      description: |
        Одна запись бота на пару (агент, проект, `bot_type`): при повторном вызове — обновление полей и перезапуск бота.
        Для MAX: задайте `webhook_secret` и укажите вебхук на `POST /api/pfp/constructor/webhook/max/{id}` (id бота из ответа списка/БД).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorBotRegister'
      responses:
        '200':
          description: Бот сохранён и перезапущен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConstructorBotRegisterResponse'
        '500':
          description: Ошибка сохранения
    get:
      tags: [ "Конструктор ИИ" ]
      summary: Список ботов агента в проекте (или один по типу)
      parameters:
        - name: bot_type
          in: query
          required: false
          schema:
            type: string
            example: telegram
          description: Если указан — в ответе один объект бота или пустой объект `{}`
      responses:
        '200':
          description: Массив ботов или один объект при `bot_type`
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/ConstructorBot'
                  - $ref: '#/components/schemas/ConstructorBot'
                  - type: object
                    description: Пустой объект, если бот с указанным bot_type не найден
                    additionalProperties: false

  /pfp/constructor/clients:
    get:
      tags: [ "Конструктор ИИ" ]
      summary: Клиенты ботов конструктора
      parameters:
        - name: bot_id
          in: query
          required: false
          schema:
            type: string
          description: Фильтр по id бота; иначе — клиенты всех ботов агента
      responses:
        '200':
          description: Список с полями сессии и последним сообщением
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConstructorClientRow'

  /pfp/constructor/messages/{clientId}:
    get:
      tags: [ "Конструктор ИИ" ]
      summary: История сообщений с клиентом
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Сообщения по сессиям клиента
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConstructorChatMessage'
        '403':
          description: Клиент не принадлежит боту агента

  /pfp/constructor/send-message:
    post:
      tags: [ "Конструктор ИИ" ]
      summary: Отправить сообщение клиенту из ЛК (текст или медиа)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorSendMessageBody'
      responses:
        '200':
          description: Отправлено
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  messageId: { type: string }
        '403':
          description: Нет доступа к клиенту
        '500':
          description: Ошибка мессенджера

  /pfp/constructor/broadcast:
    post:
      tags: [ "Конструктор ИИ" ]
      summary: Рассылка всем клиентам первого бота агента
      description: Берётся первый бот по `agent_id` (как в коде контроллера).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorBroadcastBody'
      responses:
        '200':
          description: Результаты рассылки
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  results:
                    type: object
        '404':
          description: Бот не найден

  /pfp/constructor/bots:
    get:
      tags: [ "Конструктор ИИ" ]
      summary: Список ботов (с email агента)
      description: |
        В ЛК агента выборка ограничивается `project_id` из контекста авторизации.
        Поле `agent_email` приходит из join с `agents`.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/ConstructorBot'
                    - type: object
                      properties:
                        agent_email: { type: string, nullable: true }

  /pfp/constructor/commands:
    get:
      tags: [ "Конструктор ИИ" ]
      summary: Список команд CJM (шаблоны проекта или привязка к боту)
      description: |
        Без `bot_id`: по умолчанию шаблоны (`is_template: true`) текущего `project_id`.
        С `bot_id` — команды этого бота. С `is_template=true|false` — фильтр по шаблонам и проекту.
      parameters:
        - name: bot_id
          in: query
          schema: { type: string }
        - name: is_template
          in: query
          schema: { type: boolean }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConstructorCommand'
    post:
      tags: [ "Конструктор ИИ" ]
      summary: Создать команду или шаблон
      description: |
        Если не передан `bot_id`, запись создаётся как шаблон проекта (`is_template` по умолчанию true).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorCommandCreate'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  success: { type: boolean, example: true }

  /pfp/constructor/commands/{id}:
    put:
      tags: [ "Конструктор ИИ" ]
      summary: Обновить команду
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorCommandUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
    delete:
      tags: [ "Конструктор ИИ" ]
      summary: Удалить команду
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }

  /pfp/constructor/brain-contexts:
    get:
      tags: [ "Конструктор ИИ" ]
      summary: Список brain-contexts проекта
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConstructorBrainContext'
    post:
      tags: [ "Конструктор ИИ" ]
      summary: Создать brain-context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorBrainContextCreate'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  id: { type: integer, format: int64 }

  /pfp/constructor/brain-contexts/{id}:
    put:
      tags: [ "Конструктор ИИ" ]
      summary: Обновить brain-context
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorBrainContextUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
    delete:
      tags: [ "Конструктор ИИ" ]
      summary: Удалить brain-context
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }

  # ==================== COMON (общие, под авторизацией PFP) ====================
  /pfp/comon/maintenance-info:
    get:
      tags: [ "Comon (общее)" ]
      summary: Служебная информация Comon (режим обслуживания и т.п.)
      responses:
        "200":
          description: Успешно
        "502":
          description: Не удалось обратиться к Comon

  /pfp/comon/strategies/resolve:
    post:
      tags: [ "Comon (общее)" ]
      summary: Разобрать ссылку на страницу стратегии в comon_strategy_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComonResolveBody"
      responses:
        "200":
          description: success, data.strategyId, pageUrl, profitApiPath
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComonResolveResponse"
        "400":
          description: Невалидная ссылка

  /pfp/comon/strategies/{comonId}/profit:
    get:
      tags: [ "Comon (общее)" ]
      summary: Сырой JSON доходности по id стратегии на Comon (не внутренний id БД)
      parameters:
        - name: comonId
          in: path
          required: true
          schema:
            type: string
            example: "114155"
      responses:
        "200":
          description: Как отдаёт Comon (обычно data.strategy — массив точек date/value/rValue)
        "502":
          description: Ошибка Comon

  /pfp/comon/strategies/{comonId}/details:
    get:
      tags: [ "Comon (общее)" ]
      summary: Урезанные поля карточки из __NEXT_DATA__ (без HTML)
      description: |
        Структура Next.js на comon.ru не является стабильным контрактом; в ответе `schema_version`, `fields` может быть null.
      parameters:
        - name: comonId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: success, data.strategyId, schema_version, page_props_keys, fields
        "502":
          description: Ошибка Comon

  /pfp/comon/strategies/{comonId}:
    get:
      tags: [ "Comon (общее)" ]
      summary: HTML страницы + __NEXT_DATA__ при наличии
      parameters:
        - name: comonId
          in: path
          required: true
          schema:
            type: string

  # ==================== СТРАТЕГИИ COMON (ЛК АГЕНТА) ====================
  /pfp/agent/comon-strategies:
    get:
      tags: [ "Стратегии Comon (агент)" ]
      summary: Список карточек стратегий текущего агента
      description: |
        Требуется JWT агента и tenant. В ответе — `risk_profiles` (справочник для поля risk_profile).
        Подробности и тексты для UI — docs/COMON_STRATEGIES_LK.md
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentComonStrategyListResponse"
    post:
      tags: [ "Стратегии Comon (агент)" ]
      summary: Создать карточку
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentComonStrategyCreate"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentComonStrategyMutationResponse"
        "400":
          description: Ошибка валидации
        "409":
          description: Эта стратегия Comon уже привязана к агенту

  /pfp/agent/comon-strategies/{id}:
    get:
      tags: [ "Стратегии Comon (агент)" ]
      summary: Одна карточка по внутреннему id (таблица agent_comon_strategies)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentComonStrategyOneResponse"
        "404":
          description: Не найдено
    patch:
      tags: [ "Стратегии Comon (агент)" ]
      summary: Частичное обновление (минимум одно поле)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentComonStrategyPatch"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentComonStrategyMutationResponse"
        "404":
          description: Не найдено
        "409":
          description: Конфликт comon_strategy_id
    delete:
      tags: [ "Стратегии Comon (агент)" ]
      summary: Удалить карточку
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: success true
        "404":
          description: Не найдено

  /pfp/agent/comon-strategies/{id}/preview:
    get:
      tags: [ "Стратегии Comon (агент)" ]
      summary: Экран «посмотреть у себя» — карточка + ряд Comon + метрики (один вызов к Comon)
      description: Удобно для ЛК агента (график и цифры без трёх отдельных запросов).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: success, data.strategy, data.comon_profit, data.metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentComonStrategyPreviewResponse"
        "404":
          description: Не найдено
        "502":
          description: Ошибка Comon

  /pfp/agent/comon-strategies/{id}/profit:
    get:
      tags: [ "Стратегии Comon (агент)" ]
      summary: Ряд доходности Comon для сохранённой карточки (id — внутренний)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: success, data — тело ответа Comon
        "502":
          description: Ошибка Comon

  /pfp/agent/comon-strategies/{id}/profit/metrics:
    get:
      tags: [ "Стратегии Comon (агент)" ]
      summary: Метрики (итог за период, 30 дней, CAGR) + definitions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: success, data.comon_strategy_id, data.metrics
        "502":
          description: Ошибка Comon

components:
  schemas:
    AiAssistantChatMessage:
      type: object
      properties:
        id: { type: integer }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        created_at: { type: string, format: date-time }

    CrmBriefingResponse:
      type: object
      properties:
        briefing:
          type: string
          description: AI-generated daily briefing text

    ClientCrmUpdate:
      type: object
      required: [client_id, crm_status]
      properties:
        client_id:
          type: integer
        crm_status:
          type: string
          enum: [THINKING, BOUGHT, REFUSED, RENEWAL]
        notes:
          type: string
          nullable: true

    AiPlanAssistantChatRequest:
      type: object
      required: [client_id, message]
      properties:
        client_id:
          type: integer
          description: ID клиента в текущем project_id
        message:
          type: string
          description: Вопрос агента по плану клиента
        assistant_id:
          type: integer
          nullable: true
          description: Опционально. Если не передан, используется `ai-plan-assistant`

    AiAgentClientChatRequest:
      type: object
      required: [client_id, message]
      properties:
        client_id:
          type: integer
          description: ID клиента в текущем project_id
        message:
          type: string
          description: Вопрос агента по финансовому плану клиента
        assistant_id:
          type: integer
          nullable: true
          description: |
            Опционально. Если не передан, backend создаёт/использует ассистента
            со slug `ai-agent-client-lk`.

    ChatAiMessage:
      type: object
      description: Одно сообщение B2C-чата (общий формат для site и chat_AI)
      properties:
        id:
          type: integer
        stage_key:
          type: string
          description: Стадия, с которой связано сообщение
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        created_at:
          type: string
          format: date-time

    AgentClientB2CRow:
      type: object
      description: |
        Строка клиента из БД + вычисляемое/JSON поле `goals_summary` (упрощённый расчёт без тяжёлых вложений).
        Остальные поля профиля и целей — см. ответ API (схема намеренно расширяемая).
      properties:
        id:
          type: integer
        project_id:
          type: integer
          nullable: true
        agent_id:
          type: integer
          nullable: true
        user_id:
          type: integer
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        avg_monthly_income:
          type: number
          nullable: true
        spouse_avg_monthly_income:
          type: number
          nullable: true
          description: Среднемесячный доход супруги/супруга до НДФЛ (справочное поле, пока не участвует в расчётах)
        goals_summary:
          type: object
          nullable: true
          description: Сводка по целям и портфелю (упрощённая)
        risk_profile_answers:
          type: object
          nullable: true
          additionalProperties:
            oneOf:
              - type: string
              - type: integer
          description: Ответы клиента на риск-анкету (question_code -> option_code/score)
        risk_questionnaire_version_id:
          type: integer
          nullable: true
          description: Версия анкеты, по которой собраны ответы
        risk_profile_result:
          allOf:
            - $ref: '#/components/schemas/RiskProfileResult'
          nullable: true
          description: Последний рассчитанный explainable результат риск-профиля
        chat_ai_messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatAiMessage'
          description: История chat_AI (`chat_AI/stream`); пустой массив, если не было или выключено `include_chat_ai`
        b2c_site_chat_messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatAiMessage'
          description: История обычного B2C чата (`chat/stream`); пустой массив, если не было или выключено `include_chat_ai`
        constructor_site_chat_messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatAiMessage'
          description: |
            Чат конструктора (`/pfp/constructor/site-chat/stream`); `stage_key` обычно `constructor`.
            Пустой массив, если не было или выключено `include_chat_ai`.
        owner_label:
          type: string
          nullable: true
          description: Только в режиме «все агенты видят всех» — подпись владельца клиента
      additionalProperties: true

    AgentClientsListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentClientB2CRow'
        pagination:
          type: object
          required: [total, page, limit, totalPages]
          properties:
            total: { type: integer }
            page: { type: integer }
            limit: { type: integer }
            totalPages: { type: integer }

    AgentClientCardResponse:
      allOf:
        - $ref: '#/components/schemas/AgentClientB2CRow'
      description: Полная карточка клиента (те же поля, что в списке, плюс goals, assets, liabilities, expenses и т.д.)

    NdaSendRequestBody:
      type: object
      required: [client_email, client_full_name, client_phone, client_birth_date, client_gender]
      description: |
        На `client_email` уходит PDF; `client_email`, `client_full_name`, `client_phone`, `client_birth_date` — в таблице сторон NDA.
        `client_gender` — только для текста письма (обращение), в PDF не попадает.
        Раньше поддерживались `client_passport_line` и `client_address_line` — **удалены**, не отправлять.
      properties:
        client_email:
          type: string
          format: email
          description: Куда отправить письмо с PDF и какой email показать в документе
        client_full_name:
          type: string
          minLength: 2
          maxLength: 500
          description: ФИО клиента для таблицы сторон в NDA
        client_phone:
          type: string
          minLength: 1
          maxLength: 50
          description: Телефон для таблицы сторон
        client_birth_date:
          type: string
          format: date
          description: Дата рождения ISO 8601 (`YYYY-MM-DD`), например `1985-06-12`
        client_gender:
          type: string
          enum: [male, female]
          description: Пол клиента — приветствие в письме (Уважаемый/Уважаемая); в PDF не подставляется
      additionalProperties: false

    NdaSendResponse:
      type: object
      required: [ok, filename, pdf_base64, client_email]
      properties:
        ok:
          type: boolean
          example: true
        message_id:
          type: string
          nullable: true
          description: Идентификатор письма в Resend (если доставка через Resend)
        filename:
          type: string
          description: Имя файла вложения
        pdf_base64:
          type: string
          description: Тот же PDF в Base64 (превью или скачивание в ЛК)
        client_email:
          type: string
          format: email
          description: Адрес, на который отправлено письмо (тот же, что `client_email` в запросе)

    RiskProfileAnswersRequest:
      type: object
      properties:
        risk_profile_answers:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: integer
        risk_questionnaire_version_id:
          type: integer
      required: [risk_profile_answers]

    RiskProfileAnswersResponse:
      type: object
      properties:
        risk_profile_answers:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: integer
        risk_questionnaire_version_id:
          type: integer
          nullable: true
        risk_profile_result:
          $ref: '#/components/schemas/RiskProfileResult'
        risk_profile_explanation:
          $ref: '#/components/schemas/RiskProfileExplanation'

    RiskProfileExplanation:
      type: object
      description: |
        Текстовое объяснение риск-профиля для UI (LLM + fallback, без изменения расчетной математики backend).
      properties:
        version:
          type: string
          example: v1
        generated_at:
          type: string
          format: date-time
        source_hash:
          type: string
          example: sha256:9b7e...
        title:
          type: string
        summary:
          type: string
        key_factors:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
        caution:
          type: string
        agent_note:
          type: string

    RiskProfileResult:
      type: object
      description: |
        Explainable результат скоринга.
        `risk_profile` — 3 уровня для обратной совместимости с текущими портфелями.
        `risk_profile_extended` — 5 уровней для расширенного UI.
      properties:
        risk_profile:
          type: string
          enum: [CONSERVATIVE, BALANCED, AGGRESSIVE]
        risk_profile_extended:
          type: string
          enum: [CONSERVATIVE, MODERATELY_CONSERVATIVE, BALANCED, MODERATELY_AGGRESSIVE, AGGRESSIVE]
          nullable: true
        questionnaire_version_id:
          type: integer
          nullable: true
        questionnaire_version_code:
          type: string
          nullable: true
        base_score:
          type: number
          nullable: true
        behavior_score:
          type: number
          nullable: true
        behavior_coefficient:
          type: number
          nullable: true
        final_score:
          type: number
          nullable: true
        max_final_score_by_capacity:
          type: number
          nullable: true
        answers:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: integer
        explanation:
          type: object
          additionalProperties: true

    ComonResolveBody:
      type: object
      properties:
        url:
          type: string
          example: "https://www.comon.ru/strategies/114155/"
        link:
          type: string
      description: Достаточно одного из полей url или link

    ComonResolveResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            strategyId:
              type: string
            pageUrl:
              type: string
            profitApiPath:
              type: string
              description: Внутренний путь бэка PFP к прокси profit

    ComonPortfolioItem:
      type: object
      required: [instrument, share_percent]
      properties:
        instrument:
          type: string
        share_percent:
          type: number
          description: Доля в процентах (например 60)

    AgentComonStrategyCreate:
      type: object
      required: [comon_url, name, risk_profile, portfolio]
      properties:
        comon_url:
          type: string
        name:
          type: string
        min_contribution:
          type: number
          nullable: true
        risk_profile:
          type: string
          enum: [conservative, balanced, aggressive]
        description:
          type: string
          nullable: true
        portfolio:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/ComonPortfolioItem"

    AgentComonStrategyPatch:
      type: object
      minProperties: 1
      properties:
        comon_url:
          type: string
        name:
          type: string
        min_contribution:
          type: number
          nullable: true
        risk_profile:
          type: string
          enum: [conservative, balanced, aggressive]
        description:
          type: string
          nullable: true
        portfolio:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/ComonPortfolioItem"

    AgentComonStrategyCard:
      type: object
      properties:
        id:
          type: integer
          format: int64
        agent_id:
          type: integer
          format: int64
        comon_strategy_id:
          type: string
        comon_url:
          type: string
          nullable: true
        comon_profit_api_url:
          type: string
          nullable: true
          description: Публичный URL API Comon для графика
        name:
          type: string
        min_contribution:
          type: number
          nullable: true
        risk_profile:
          type: string
        description:
          type: string
          nullable: true
        portfolio:
          type: array
          items:
            $ref: "#/components/schemas/ComonPortfolioItem"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentComonStrategyListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/AgentComonStrategyCard"
        risk_profiles:
          type: array
          items:
            type: string
          example: [conservative, balanced, aggressive]

    AgentComonStrategyOneResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AgentComonStrategyCard"

    AgentComonStrategyMutationResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AgentComonStrategyCard"

    AgentComonStrategyPreviewResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            strategy:
              $ref: "#/components/schemas/AgentComonStrategyCard"
            comon_profit:
              type: object
              description: Сырой JSON ответа Comon /api/v2/strategies/.../profit
            metrics:
              type: object
              description: Результат computeComonProfitMetrics (ok, total_return_pct, cagr_annualized_pct, definitions, …)

    ConstructorBotRegister:
      type: object
      properties:
        name:
          type: string
        link:
          type: string
          nullable: true
          description: Ссылка на бота (публичная)
        token:
          type: string
          description: Токен Telegram / MAX API
        webhook_secret:
          type: string
          nullable: true
          description: Секрет для заголовка вебхука MAX (например x-max-bot-api-secret)
        communication_style:
          type: string
          nullable: true
        base_brain_context:
          type: string
          nullable: true
          description: Базовый системный контекст бота
        bot_type:
          type: string
          default: telegram
          description: telegram, max и т.д.

    ConstructorBotRegisterResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message:
          type: string
          example: Bot registered and started

    ConstructorBot:
      type: object
      description: Строка из `constructor_bots` (в ответе может быть `token` — секрет)
      properties:
        id: { type: integer, format: int64 }
        agent_id: { type: integer, format: int64 }
        project_id: { type: integer, format: int64, nullable: true }
        name: { type: string }
        link: { type: string, nullable: true }
        token: { type: string }
        webhook_secret: { type: string, nullable: true }
        bot_type: { type: string }
        communication_style: { type: string, nullable: true }
        base_brain_context: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ConstructorClientRow:
      type: object
      description: Клиент + join сессии и бота (фактические поля из выборки)
      properties:
        id: { type: integer, format: int64 }
        bot_id: { type: integer, format: int64 }
        user_id: { type: string }
        nickname: { type: string, nullable: true }
        user_context: { type: string, nullable: true }
        current_stage: { type: string, nullable: true, description: Текст команды (`constructor_commands.command`) }
        bot_type: { type: string, nullable: true }
        bot_name: { type: string, nullable: true }
        last_message: { type: string, nullable: true }
        last_message_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ConstructorChatMessage:
      type: object
      properties:
        id: { type: integer, format: int64 }
        user_message: { type: string }
        assistant_message: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    ConstructorSendMessageBody:
      type: object
      required: [clientId]
      properties:
        clientId: { type: string }
        text: { type: string, nullable: true }
        photo: { type: string, nullable: true }
        video: { type: string, nullable: true }
        voice: { type: string, nullable: true }
        audio: { type: string, nullable: true }
        document: { type: string, nullable: true }

    ConstructorBroadcastBody:
      type: object
      properties:
        text: { type: string, nullable: true }
        photo: { type: string, nullable: true }
        video: { type: string, nullable: true }
        voice: { type: string, nullable: true }
        audio: { type: string, nullable: true }
        document: { type: string, nullable: true }

    ConstructorCommand:
      type: object
      properties:
        id: { type: integer, format: int64 }
        bot_id: { type: integer, format: int64, nullable: true }
        project_id: { type: integer, format: int64, nullable: true }
        command: { type: string, description: Команда/стадия, напр. /start }
        classifier: { type: string, description: Правила классификации для ИИ }
        response: { type: string, description: Ответ или шаблон ответа на стадии }
        section: { type: string, nullable: true }
        is_template: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ConstructorCommandCreate:
