        webhook_secret:
          type: string
          nullable: true
          description: Секрет для заголовка вебхука MAX (например x-max-bot-api-secret)
        communication_style:
          type: string
          nullable: true
        base_brain_context:
          type: string
          nullable: true
          description: Базовый системный контекст бота
        bot_type:
          type: string
          default: telegram
          description: telegram, max и т.д.

    ConstructorBotRegisterResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message:
          type: string
          example: Bot registered and started

    ConstructorBot:
      type: object
      description: Строка из `constructor_bots` (в ответе может быть `token` — секрет)
      properties:
        id: { type: integer, format: int64 }
        agent_id: { type: integer, format: int64 }
        project_id: { type: integer, format: int64, nullable: true }
        name: { type: string }
        link: { type: string, nullable: true }
        token: { type: string }
        webhook_secret: { type: string, nullable: true }
        bot_type: { type: string }
        communication_style: { type: string, nullable: true }
        base_brain_context: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ConstructorClientRow:
      type: object
      description: Клиент + join сессии и бота (фактические поля из выборки)
      properties:
