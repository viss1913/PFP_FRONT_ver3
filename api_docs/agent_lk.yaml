        response: { type: string }
        section: { type: string, nullable: true }
        is_template: { type: boolean }
        bot_id: { type: string, nullable: true }

    ConstructorCommandUpdate:
      type: object
      properties:
        command: { type: string }
        classifier: { type: string }
        response: { type: string }
        section: { type: string, nullable: true }
        is_template: { type: boolean }
        bot_id: { type: string, nullable: true }

    ConstructorBrainContext:
